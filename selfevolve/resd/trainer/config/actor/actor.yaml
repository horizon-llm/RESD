# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.

# Target class for this configuration
_target_: selfevolve.resd.workers.config.ActorConfig

# Number of rollouts per update (mirrors actor rollout_n)
rollout_n: ${oc.select:actor_rollout_ref.rollout.n,1}

# the abstract actor configs
# fsdp, fsdp2 or megatron. must be set.
strategy: ???

# Split each sample into sub-batches of this size for PPO
ppo_mini_batch_size: 256

# [Deprecated] Global micro batch size
ppo_micro_batch_size: null

# Local per-GPU micro batch size
ppo_micro_batch_size_per_gpu: null

# Whether to automatically adjust batch size at runtime
# oc.select: the default val for ref.log_prob_use_dynamic_bsz
use_dynamic_bsz: false

# Max tokens per GPU in one PPO batch; affects gradient accumulation
# Typically it should be: n * ${data.max_prompt_length} + ${data.max_response_length}
# oc.select: the default val for ref.log_prob_max_token_len_per_gpu
ppo_max_token_len_per_gpu: 16384

# PPO clip ratio
clip_ratio: 0.2

# Lower bound for asymmetric clipping (used in dual-clip PPO)
clip_ratio_low: 0.2

# Upper bound for asymmetric clipping (used in dual-clip PPO)
clip_ratio_high: 0.2

# Positive and negative tau for smoothing function in SAPO (https://arxiv.org/pdf/2511.20347)
# default values used in the paper with Qwen3-30B-A3B-Base
tau_pos: 1.0

# negative tau for smoothing function in SAPO
tau_neg: 1.05

# Whether to freeze vision model, if set true, it will be freeze vision model
freeze_vision_tower: false

# how many samples to dump for token loss analysis
token_loss_dump_n: 0

# policy loss config
policy_loss:

  # # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.workers.config.PolicyLossConfig

  # Loss function mode: vanilla / clip-cov / kl-cov /gpg from https://arxiv.org/abs/2505.22617
  loss_mode: "vanilla"

  # Ratio of tokens to be clipped for clip-cov loss
  clip_cov_ratio: 0.0002

  # Lower bound for clip-cov loss
  clip_cov_lb: 1.0

  # Upper bound for clip-cov loss
  clip_cov_ub: 5.0

  # Ratio of tokens to be applied kl penalty for kl-cov loss
  kl_cov_ratio: 0.0002

  # KL divergence penalty coefficient
  ppo_kl_coef: 0.1

# self-distillation config
self_distillation:

  # Distillation is enabled when policy_loss.loss_mode == "sdpo"

  # Whether to use full-logit KL distillation
  full_logit_distillation: True

  # Top-k for logit distillation; null uses full logits
  distillation_topk: 100

  # Whether to add a tail bucket when using distillation_topk
  distillation_add_tail: True

  # Top-p (nucleus) threshold for logit distillation; null uses top-k instead
  # Mutually exclusive with distillation_topk
  distillation_top_p: null

  # Maximum number of tokens to keep when using top-p (memory cap); null means no limit
  distillation_max_k: null

  # Who determines the support set: "student", "teacher", or "union"
  distillation_token_selector: "student"

  # KL interpolation coefficient: 0.0=forward KL, 1.0=reverse KL, in-between=JSD
  alpha: 0.5 

  # Minimum sequence reward to be considered successful
  success_reward_threshold: 0.5

  # Teacher regularization method: "ema" or "trust-region"
  teacher_regularization: ema

  # EMA update rate for teacher weights, or trust-region mixing coefficient
  teacher_update_rate: 0.05 

  # Maximum length of the reprompted prompt
  max_reprompt_len: 10240

  # Truncation method for the reprompted prompt (recommended to use "right" or "error")
  reprompt_truncation: right # "left", "right", "error"

  # Whether to not reprompt on self-success
  dont_reprompt_on_self_success: True

  # Whether to remove <think>...</think> tags from successful demonstrations before reprompting
  remove_thinking_from_demonstration: True

  # Whether to include environment feedback in reprompting for wrong attempts
  # If True and feedback exists: use reprompt_template_feedback_solution (with solution) or reprompt_template_feedback (without solution)
  include_environment_feedback: True

  # If True, only use feedback when no solution is available (ignore feedback when solution exists)
  # Requires include_environment_feedback=True to have any effect
  environment_feedback_only_without_solution: True

  # Success-rate weighting for self-distillation loss
  success_rate_weighting: false
  success_rate_alpha: 1.0
  success_rate_beta: 1.0

  # IS clip for loss; null disables IS weighting
  is_clip: 2

  # ACE context updater configuration
  context_updater:

    # Enable ACE context updater flow during self-distillation
    enabled: False

    # Playbook mode: "global" (single shared playbook) or "per_example" (dedicated playbook per training example)
    playbook_mode: global

    # How often to concise the playbook (in number of context updates)
    concise_frequency: 4

    # Maximum number of bullets to keep in the playbook; null disables bullet-count trigger
    max_bullets: null

    # Playbook concise strategy: "reset" or "prioritized"
    concise_method: reset

    # Whether to run concise again after curator adds bullets to enforce max_bullets
    concise_after_curation: false

    # When rollout.n > 1, only run the curator and success tagging on one sample
    # per unique example_id to avoid redundant playbook operations.
    deduplicate_rollouts: false

    # Whether to run a lightweight success reflector on correct samples to tag which
    # playbook bullets contributed to success, reinforcing their helpful counts.
    tag_correct_samples: false

    # Whether to cache successful response texts across training steps.
    # When batch_size=1 there are no in-batch peers; the buffer lets the trainer
    # re-use a successful trial from a previous step as the demonstration.
    use_solution_buffer: false

    # Whether to include ACE reflection in TEACHER_PROMPT when context updater is enabled
    use_reflection_in_teacher_prompt: True

    # Whether to include ACE playbook in TEACHER_PROMPT when context updater is enabled
    use_playbook_in_teacher_prompt: True

    # Whether to include environment feedback in TEACHER_PROMPT when context updater is enabled
    use_feedback_in_teacher_prompt: True

    # Whether to include the student's previous trial in TEACHER_PROMPT when context updater is enabled
    use_previous_trial_in_teacher_prompt: True

    # Whether to include successful solutions in TEACHER_PROMPT when context updater is enabled
    # Requires the template to contain a {solution} placeholder
    use_solution_in_teacher_prompt: False

    # Custom reflector prompt template; null uses built-in default.
    # Available variables: {prompt}, {response}, {feedback}, {teacher_feedback}, {playbook}
    # NOTE: Use double braces {{ }} for literal braces in JSON examples within the prompt.
    reflector_prompt_template: null

    # Custom success reflector prompt template; null uses built-in default.
    # Available variables: {prompt}, {response}, {playbook}
    # NOTE: Use double braces {{ }} for literal braces in JSON examples within the prompt.
    success_reflector_prompt_template: null

    # Custom curator prompt template; null uses built-in default.
    # Available variables: {playbook_stats}, {recent_reflection}, {current_playbook}, {prompt}
    # NOTE: Use double braces {{ }} for literal braces in JSON examples within the prompt.
    curator_prompt_template: null

    # Path to a text file containing the reflector prompt template.
    # Takes precedence over reflector_prompt_template. null uses reflector_prompt_template.
    reflector_prompt_file: null

    # Path to a text file containing the success reflector prompt template.
    # Takes precedence over success_reflector_prompt_template.
    success_reflector_prompt_file: null

    # Path to a text file containing the curator prompt template.
    # Takes precedence over curator_prompt_template. null uses curator_prompt_template.
    curator_prompt_file: null

    # Custom context-updater teacher (generator) prompt template; null uses built-in default.
    # Available variables: {playbook}, {prompt}, {previous_trial}, {feedback}, {reflection}, {teacher_feedback}
    # NOTE: Use double braces {{ }} for literal braces in JSON examples within the prompt.
    cu_teacher_prompt_template: null

    # Path to a text file containing the context-updater teacher prompt template.
    # Takes precedence over cu_teacher_prompt_template. null uses cu_teacher_prompt_template.
    cu_teacher_prompt_file: null

    # Whether to inject the playbook into the student prompt during first rollout.
    # The student receives a snapshot of the playbook that is synced at concise boundaries.
    use_playbook_in_student_rollout: false

    # How often (in context updates) to sync the playbook snapshot to the student.
    # null defaults to concise_frequency.
    student_playbook_sync_frequency: null

    # Custom student prompt template; null uses built-in STUDENT_PROMPT from ace_generator.py.
    # Available variables: {playbook}, {prompt}
    student_prompt_template: null

    # Path to a text file containing the student prompt template.
    # Takes precedence over student_prompt_template.
    student_prompt_file: null

  # Clamp teacher prob to be at least this proportion of student prob; null disables
  teacher_prob_min_ratio: null

  # Clamp teacher prob to be at most this proportion of student prob; null disables
  teacher_prob_max_ratio: null

  # [Deprecated] Use entropy_filter_ratio + entropy_filter_criterion instead.
  entropy_diff_filter_ratio: null

  # Fraction of tokens to keep per sequence based on entropy_filter_criterion. null disables.
  entropy_filter_ratio: null
  # Criterion for entropy-based token filtering. Options:
  #   "diff"          - keep high (teacher_H - student_H)
  #   "abs_diff"      - keep high |teacher_H - student_H|
  #   "teacher_low"   - keep low teacher entropy (confident teacher)
  #   "teacher_high"  - keep high teacher entropy (uncertain teacher)
  #   "student_high"  - keep high student entropy (confused student)
  #   "student_low"   - keep low student entropy (confident student)
  #   "ratio"         - keep high (teacher_H / student_H)
  entropy_filter_criterion: diff

  # Hard filter: only keep tokens where teacher_entropy > student_entropy. False disables.
  entropy_gt_filter: False

  # Whether to enable position-wise weighting in self-distillation loss
  position_weighting_enabled: False

  # Linear ramp slope beta for position-wise weighting, in [0.5, 2.0]
  position_weighting_beta: 1.0

  # Whether to remove <think>...</think> tokens from the loss calculation
  remove_thinking_in_loss: False

  # Whether to include the student's own previous (failed) attempt in the reprompt
  include_previous_attempt: False

  # Previous attempt template - available variables: previous_attempt_raw
  previous_attempt_template: |-

    ### The following is your previous attempt:
    <previous_attempt>{previous_attempt_raw}</previous_attempt>

  # Reprompting template - available variables: prompt, previous_attempt, solution, feedback, teacher_feedback
  reprompt_template: |-
    {prompt}{previous_attempt}{solution}{feedback}{teacher_feedback}

    Correctly solve the original question.

  # Solution template - available variables: successful_previous_attempt
  solution_template: |-

    Correct solution:

    {successful_previous_attempt}

  # Feedback template - available variables: feedback_raw
  feedback_template: |-

    ### The following is feedback from your earlier attempt:
    <feedback>{feedback_raw}</feedback>

  # If True, only use teacher feedback when no solution is available
  teacher_feedback_only_without_solution: False

  # Teacher feedback template - available variables: teacher_feedback_raw
  # Leading newline is intentional: keeps the section absent (no blank line) when teacher_feedback=""
  teacher_feedback_template: |-

    ### The following is feedback from the teacher model:
    <teacher_feedback>{teacher_feedback_raw}</teacher_feedback>

  # Teacher feedback server configuration
  teacher:

    # Whether the teacher feedback server is enabled
    enabled: false

    # IP address of the teacher feedback server
    server_ip: "127.0.0.1"

    # Port of the teacher feedback server
    server_port: 15555

    # Number of parallel server workers
    n_server_workers: 1

    # Max tokens for teacher feedback generation
    max_tokens: 16384

    # Sampling temperature for teacher feedback generation
    temperature: 0.7

    # Max tokens for the feedback prompt sent to the teacher
    max_feedback_prompt_len: 4096

    # Whether to request teacher feedback for correctly solved samples (acc >= success_reward_threshold).
    # By default (False), teacher feedback is only requested for incorrect samples.
    feedback_on_correct: false

    # Template for querying the teacher; available variables: {prompt}, {response}, {feedback}
    feedback_prompt_template: |
      You are an expert analyst and educator. Your job is to diagnose why a model's reasoning went wrong by analyzing the environment feedback.

      **Instructions:**
      - Carefully analyze the model's reasoning trace to identify where it went wrong
      - Take the environment feedback into account
      - Identify specific conceptual errors, calculation mistakes, or misapplied strategies
      - Provide actionable insights that could help the model avoid this mistake in the future
      - Focus on the root cause, not just surface-level errors
      - Be specific about what the model should have done differently

      Your output should be a json object, which contains the following fields
        - error_identification: what specifically went wrong in the reasoning?
        - root_cause_analysis: why did this error occur? What concept was misunderstood?
        - correct_approach: what should the model have done instead?
        - key_insight: what strategy, formula, or principle should be remembered to avoid this error?

      Question: {prompt}

      Student Response: {response}
      
      Environment feedback: {feedback}

      **Answer in this exact JSON format:**
      {{
        "error_identification": "[What specifically went wrong in the reasoning?]",
        "root_cause_analysis": "[Why did this error occur? What concept was misunderstood?]",
        "correct_approach": "[What should the model have done instead?]",
        "key_insight": "[What strategy, formula, or principle should be remembered to avoid this error?]"
      }}

# Constant C in Dual-clip PPO; clips when advantage < 0 and ratio > C
clip_ratio_c: 3.0

# Loss aggregation mode: "token-mean", "seq-mean-token-sum", "seq-mean-token-mean", or "seq-mean-token-sum-norm"
loss_agg_mode: token-mean

# Scale factor for "seq-mean-token-sum-norm" loss aggregation mode.
# If null, uses response_length. Set to a constant to ensure consistent normalization.
loss_scale_factor: null

# Entropy regularization coefficient in PPO loss
entropy_coeff: 0

# When true, the actor forward will request entropy from the model
calculate_entropy: false

# Whether to use KL loss instead of KL reward penalty. True for GRPO
use_kl_loss: false

# Whether to enable PrefixGrouper shared-prefix forward
use_prefix_grouper: false

# Whether to use torch.compile()
# oc.select: the default val for ref.use_torch_compile
use_torch_compile: true

# KL loss coefficient when use_kl_loss is enabled. For GRPO
kl_loss_coef: 0.001

# Type of KL divergence loss. Options: "kl"(k1), "abs", "mse"(k2), "low_var_kl"(k3), "full"
kl_loss_type: low_var_kl

# Number of PPO epochs per batch
ppo_epochs: 1

# Shuffle training data across PPO epochs
shuffle: false

# The seed used to construct mini-batch
data_loader_seed: 42

# checkpoint configs
checkpoint:

  # Target dataclass for this configuration
  _target_: verl.trainer.config.CheckpointConfig

  # What to include in saved checkpoints
  # with 'hf_model' you can save whole model as hf format, now only use sharded model checkpoint to save space
  save_contents: ['model', 'optimizer', 'extra']

  # For more flexibility, you can specify the contents to load from the checkpoint.
  # .xxx refers to the local variable xxx from the same level of hierarchy similar to python pkg
  load_contents: ${.save_contents}

  # Whether to save checkpoints asynchronously. Only effective for Megatron as of now.
  async_save: False

# optimizer configs
optim:

  # Learning rate
  lr: 1e-6

  # Warmup steps ratio (used if lr_warmup_steps is 0 or negative)
  lr_warmup_steps_ratio: 0.0

  # Total training steps (must be overridden at runtime)
  total_training_steps: -1

  # Weight decay
  weight_decay: 0.01

  # Prioritized. None, 0 or Negative values mean delegating to lr_warmup_steps_ratio.
  lr_warmup_steps: -1


# Whether to use custom fused kernels (e.g., FlashAttention, fused MLP)
use_fused_kernels: ${oc.select:actor_rollout_ref.model.use_fused_kernels,false}

# profile the actor model in `update_policy` 
profiler:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.utils.profiler.ProfilerConfig

  # profiler tool, default same as profiler.tool in global config
  # choices: nsys, npu, torch
  tool: ${oc.select:global_profiler.tool,null}

  # whether enable profile on Actor
  enable: False
  
  # Whether to profile all ranks.
  all_ranks: False

  # The ranks that will be profiled. [] or [0,1,...]
  ranks: []

  # profile results saving path
  save_path: ${oc.select:global_profiler.save_path,null}

  # specific tool config which only related to the role
  tool_config:

    # nsys tool config
    nsys:

      # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
      _target_: verl.utils.profiler.config.NsightToolConfig
    
      # True for each task has its own database, False for all tasks in one training step share one database.
      discrete: ${oc.select:global_profiler.global_tool_config.nsys.discrete}
    
    # npu config
    npu:

      # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
      _target_: verl.utils.profiler.config.NPUToolConfig

      # Contents to profile, can be empty
      # options: npu, cpu, memory, shapes, module, stack
      contents: []

      # Collection level, optional values: level_none, level0, level1, level2.
      level: "level0"

      # Whether to automatically parse the data.
      analysis: True

      # True for each task has its own database, False for all tasks in one training step share one database.
      discrete: False
    
    # torch profiler config
    torch:

      # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
      _target_: verl.utils.profiler.config.TorchProfilerToolConfig

      # Contents to profile, can be empty
      # options: cuda, cpu, memory, shapes, stack
      contents: []

      # True for each task has its own database, False for all tasks in one training step share one database.
      discrete: false

    # torch memory profiler config
    torch_memory:

      # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
      _target_: verl.utils.profiler.config.TorchMemoryToolConfig

      # Maximum number of memory allocation entries to track
      trace_alloc_max_entries: ${oc.select:global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}

      # Stack trace depth for memory allocations
      stack_depth: ${oc.select:global_profiler.global_tool_config.torch_memory.stack_depth,32}

# Router replay configuration for MoE models
router_replay:

  # Target dataclass for this configuration
  _target_: verl.workers.config.RouterReplayConfig

  # Router replay mode: disabled, R2, R3
  # - R2: Use R2 routing strategy (record mode)
  # - R3: Use R3 routing strategy (record mode)
  mode: disabled

  # File path to save recorded routing decisions
  # Required when mode is 'record', 'R2', or 'R3'
  record_file: null

  # File path to load recorded routing decisions for replay
  # Required when mode is 'replay'
  replay_file: null

