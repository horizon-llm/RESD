# @package _global_
defaults:
  - _self_

type: simple
model:
  model_provider:
    type: chat.completions
    model: Qwen3-4B-Thinking-2507
  model_settings:
    temperature: 0.3
    top_p: 0.95
    include_usage: true
    extra_args:
      timeout: 3000
  model_params: {}
agent:
  name: math_agent
  instructions: "Solve the following problem step by step. You now have the ability\
    \ to selectively write executable Python code to enhance your reasoning process,\
    \ e.g., calulating numbers and verifying math computations. Never directly just\
    \ printing your textual reasoning in Python. The Python code will be executed\
    \ by an external sandbox, and the output (returned as a dict with the message\
    \ in the \"message\" field) can be returned to aid your reasoning and help you\
    \ arrive at the final answer. The Python code should be complete scripts, including\
    \ necessary imports. \nEach code snippet is wrapped with \n```python\ncode snippet\n\
    ```.\n\nThe last part of your final response should be in the following format:\n\
    <answer>\n\\\\boxed{{'The final answer goes here.'}}\n</answer>\n\nWhen solving\
    \ problems, you MUST first carefully read and understand the helpful instructions\
    \ and experiences:\n[G0]. Divisibility Insight: Prioritize identifying key divisibility\
    \ implications over expanding expressions to uncover problem structure and guide\
    \ systematic case analysis.\n[G1]. Recurrence Check: For small grid path problems,\
    \ use recurrence relations to avoid exhaustive enumeration and scale efficiently\
    \ for larger n.\n[G2]. CRT Decomposition: Decompose composite moduli into prime\
    \ components to analyze residue constraints.\n[G3]. Pulley Geometry: Derive acceleration\
    \ relationships using trigonometric geometry for angled systems.\n[G4]. Clarify\
    \ Terms: Systematically verify sequence construction for all terms to ensure global\
    \ condition holds.\n[G5]. Understand First: Prioritize deep problem comprehension\
    \ before modeling to avoid incorrect assumptions.\n[G6]. Incremental testing:\
    \ Systematically increase potential values while maintaining constraint satisfaction.\n\
    [G7]. Sequence Enumeration: For streak-based scoring problems, enumerate all possible\
    \ sequences and calculate individual scores based on rules before deriving a general\
    \ formula.\n[G8]. Base Cases: When confused about streak bonus points, explicitly\
    \ define scoring for sequences of length 1, 2, or 3 before calculations.\n[G9].\
    \ Min Expectation: Use E[X] = Σ P(X ≥ m) to avoid error-prone direct counting\
    \ for permutation minimum expectations.\n[G10]. Quadratic Residues: Identify exponent\
    \ sets closed under primitive root multiplication as quadratic residues mod p\
    \ (odd prime) to exploit multiplicative group structure in root of unity sums.\n\
    [G11]. Verification: Always cross-check solutions to catch counting errors.\n\
    [G12]. Convex Recognition: Recognize convex sequences through non-decreasing differences\
    \ to guide problem transformation.\n[G13]. Recurrence Pattern Recognition: Work\
    \ through small cases to identify patterns in recurrence relations before formal\
    \ analysis.\n[G14]. Block Decomposition: Use 2x2 grid blocks to maximize placements\
    \ under adjacency constraints.\n[G15]. Absolute Value Cases: Break compound inequalities\
    \ with absolute values into sign-based cases to prevent missing solution intervals.\n\
    [G16]. Modular Injectivity: Test increasing primes from 2 to verify function injectivity\
    \ modulo p by collision checking.\n[G17]. Quadratic Residue Check: Systematically\
    \ verify all values in [0, p-1] for the smallest modulus to ensure completeness\
    \ when identifying common quadratic residues.\n[G18]. Residue Count Verification:\
    \ Verify counts for each residue class before proceeding to avoid miscalculations\
    \ in solution counting.\n[G19]. Semiprime Condition: For gcd sequences with coprime\
    \ endpoints, the middle term must be a product of two distinct primes."
toolkits:
  python_executor:
    mode: builtin
    env_mode: local
    name: python_executor
    config: {}
    mcp_transport: stdio
    mcp_client_session_timeout_seconds: 20
