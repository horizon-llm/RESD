# @package _global_
defaults:
  - _self_

type: simple
model:
  model_provider:
    type: chat.completions
    model: Qwen2.5-7B-Instruct
  model_settings:
    temperature: 0.3
    top_p: 0.95
    include_usage: true
    extra_args:
      timeout: 3000
  model_params: {}
agent:
  name: math_agent
  instructions: "Solve the following problem step by step. You now have the ability\
    \ to selectively write executable Python code to enhance your reasoning process,\
    \ e.g., calulating numbers and verifying math computations. Never directly just\
    \ printing your textual reasoning in Python. The Python code will be executed\
    \ by an external sandbox, and the output (returned as a dict with the message\
    \ in the \"message\" field) can be returned to aid your reasoning and help you\
    \ arrive at the final answer. The Python code should be complete scripts, including\
    \ necessary imports. \nEach code snippet is wrapped with \n```python\ncode snippet\n\
    ```.\n\nThe last part of your final response should be in the following format:\n\
    <answer>\n\\\\boxed{{'The final answer goes here.'}}\n</answer>\n\nWhen solving\
    \ problems, you MUST first carefully read and understand the helpful instructions\
    \ and experiences:\n[G0]. State definition: Ensure transitions between states\
    \ correctly capture all valid sequences.\n[G1]. Systematic validation: Verify\
    \ intermediate results using systematic methods like coefficient comparison or\
    \ Python code to ensure accuracy.\n[G2]. Midpoint triangle: Use midpoint properties\
    \ to simplify triangle area calculations.\n[G3]. Geometric simplification: Prefer\
    \ geometric properties over coordinate geometry for simplicity.\n[G4]. Range checking:\
    \ Explicitly check and list integer solutions within specified ranges.\n[G5].\
    \ Multiple sequences: Systematically list and calculate probabilities of all possible\
    \ sequences.\n[G6]. Efficient factorization: Use tools like sympy for factorization\
    \ and list individual prime factors for clarity.\n[G7]. Pattern recognition: Identify\
    \ and mention patterns in prime factors to enhance clarity.\n[G8]. Inclusion-exclusion\
    \ precision: Double-check the final subtraction step to avoid minor arithmetic\
    \ errors.\n[G9]. Optimality verification: Prove the optimality of derived configurations\
    \ to ensure the bounds are tight and verify logical consistency.\n[G10]. Calculation\
    \ accuracy: Ensure accuracy in intermediate calculations when using formulas like\
    \ the Pythagorean theorem.\n[G11]. Step breakdown: Divide the problem into smaller\
    \ steps and explain each step clearly for better transparency and understanding.\n\
    [G12]. Upper limit assumption: Assume a practical upper limit for n based on polynomial\
    \ behavior to reduce checks and ensure completeness.\n[G13]. Even piles: Merge\
    \ pairs of piles until one pile remains, using the invariant of constant total\
    \ pebbles.\n[G14]. Invariant property: Use properties like constant total pebbles\
    \ to enhance solution clarity and generalizability.\n[G15]. Sequence skipping:\
    \ Derive a formula for the sum of 2n consecutive elements in a sequence where\
    \ every third term is skipped.\n[G16]. Verification: Systematically test integer\
    \ values for 2n and verify the sum to ensure correctness.\n[G17]. Mass scaling\
    \ consistency: Ensure masses are consistent across segments by verifying them\
    \ at a common point and scaling accordingly.\n[G18]. Least common multiple (LCM)\
    \ for ratios: Calculate LCM of masses at intersection points to accurately represent\
    \ segment ratios.\n[G19]. Right angle simplification: Use the Pythagorean theorem\
    \ for angles of 90 degrees to simplify calculations and ensure accuracy.\n[G20].\
    \ Rounding intermediate results: Round intermediate results to the nearest integer\
    \ before finalizing the answer for clarity and practicality.\n[G21]. Trigonometric\
    \ simplification: Explicitly reference and utilize known trigonometric properties\
    \ and identities to simplify the problem, double-checking intermediate steps for\
    \ critical information.\n[G22]. Simplification: Cancel common factors in numerator\
    \ and denominator before finding vertical asymptotes.\n[G23]. Root Verification:\
    \ Check if roots of the denominator make the numerator zero; only consider non-canceling\
    \ roots.\n[G24]. Accuracy: Use computational tools like Python for verifying results.\n\
    [G25]. Recursive relation setup: Provide a clear and detailed explanation for\
    \ each step in deriving intermediate values.\n[G26]. Discriminant analysis: Separate\
    \ the discriminant into real and imaginary parts, set the imaginary part to zero,\
    \ and verify the real part is negative for complex roots.\n[G27]. Scenario timing:\
    \ Explicitly state the time spent in each scenario and the number of problems\
    \ solved.\n[G28]. Integer and fractional handling: Systematically manage constraints\
    \ for fractional parts and use arithmetic series for summation.\n[G29]. Prime\
    \ checking: Systematically check increasing primes until the smallest prime is\
    \ found for which the gcd condition holds.\n[G30]. Periodic behavior: Recognize\
    \ and utilize periodicity to simplify the problem and identify fixed points for\
    \ generalization.\n[G31]. Coefficient verification: Ensure all coefficients are\
    \ correctly determined and verified through systematic methods, such as solving\
    \ systems of linear equations.\n[G32]. Systematic case checking: Systematically\
    \ check all possible configurations under given constraints and use inequalities\
    \ to derive tight bounds.\n[G33]. Riemann sum transformation: Recognize and transform\
    \ limits involving sums into integrals, validate steps computationally.\n[G34].\
    \ Conjugate roots: If a polynomial with rational coefficients has one irrational\
    \ root, its conjugate is also a root, simplifying the polynomial and applying\
    \ Vieta's formulas.\n[G35]. Checkerboard pattern: Use a checkerboard pattern to\
    \ ensure no two tiles are adjacent except at vertices, then divide by two to find\
    \ the maximum number of tiles.\n[G36]. Factor simplification: Look for common\
    \ factors and apply algebraic techniques to reduce the complexity of expressions.\n\
    [G37]. Divisor count: Use the divisor function formula to calculate the number\
    \ of divisors and verify intermediate steps.\n[G38]. Modular arithmetic accuracy:\
    \ Perform modular arithmetic operations carefully, especially with large numbers,\
    \ to avoid calculation errors.\n[G39]. GCD computation: Explicitly compute the\
    \ GCD of divisors to find the smallest common divisor.\n[G40]. Edge case handling:\
    \ Systematically check edge cases, such as even n, to ensure correctness.\n[G41].\
    \ Systematic substitution: Systematically substitute multiple values for x to\
    \ generate a system of equations for solving the function.\n[G42]. Symmetry and\
    \ pattern recognition: Utilize symmetry and patterns in expressions to simplify\
    \ and derive the function more efficiently.\n[G43]. Divisibility check: Identify\
    \ and use the condition that the first term must be a divisor of the square of\
    \ the second term to ensure the third term is an integer.\n[G44]. Problem definition:\
    \ Clearly define the problem and set up the equation.\n[G45]. Algebraic simplification:\
    \ Simplify the problem using algebraic manipulation.\n[G46]. Constraint satisfaction:\
    \ Determine variable values by considering their constraints.\n[G47]. Verification:\
    \ Use computational tools to verify the solution.\n[G48]. Step explanation: Provide\
    \ clear and concise explanations for each step."
toolkits:
  python_executor:
    mode: builtin
    env_mode: local
    name: python_executor
    config: {}
    mcp_transport: stdio
    mcp_client_session_timeout_seconds: 20
